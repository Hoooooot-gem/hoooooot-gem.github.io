<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoooooot's Summer Camp</title>
    
    <!-- 【新增】必须放在最前面，让 js 去拉取顶栏和底栏 -->
    <script src="../../../js/components.js"></script>
    
    <!-- 复用全局 CSS -->
    <link rel="stylesheet" href="../../../css/style.css">
    
    <!-- 继承主站 Logo -->
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png">
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
    
    <!-- 子页面专属微调样式 -->
    <style>
        /* 删除 .sub-navbar 相关样式 */
        .course-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 80px 120px 80px;
        }

        .course-header { margin-bottom: 48px; }
        .course-header h1 { font-size: 2.8rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 12px; }
        .course-header p { color: var(--text-secondary); font-size: 1.1rem; }

        .course-item-link {
            display: block;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .course-item-link:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .course-item {
            display: flex;
            align-items: center;
            gap: 32px;
            padding: 24px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .course-item:last-child { border-bottom: none; }

        .course-thumb {
            width: 240px;
            aspect-ratio: 16 / 9;
            flex-shrink: 0;
            border-radius: 6px;
            overflow: hidden;
            background-color: var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .course-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .course-info h3 { font-size: 1.3rem; margin-bottom: 6px; }
        .course-info p { color: var(--text-secondary); font-size: 0.95rem; }

        @media (max-width: 767px) {
            .course-container { padding: 40px 24px 80px 24px; }
            .course-item { flex-direction: column; align-items: flex-start; gap: 16px; }
            .course-thumb { width: 100%; }
            .course-item-link:hover { transform: none; }
        }
    </style>
</head>
<body>

    <!-- 【已删除】独立顶栏：现在由 components.js 自动从 /header.html 注入 -->

    <main class="course-container">
        <div class="course-header">
            <h1>Hoooooot's Summer Camp</h1>
            <p>从拍摄到调色，手把手带你完成一次完整的影像创作。点击课程卡片进入课程。</p>
        </div>

        <!-- 课程导航列表（保持你原本的内容不变） -->
        <div id="course-list">
            <!-- 此处省略你的课程卡片 HTML，你原封不动保留即可 -->
            <a href="play.html?id=1" class="course-item-link">
                <div class="course-item">
                    <div class="course-thumb">
                        <img src="/proj/2026/HSC/images/pa-1.png" alt="Part A-1" loading="lazy">
                    </div>
                    <div class="course-info">
                        <h3>视频“标准化”（以iPhone和Pocket 3为例）</h3>
                        <p>拍摄软件：Blackmagic Camera · 选择29.97或59.94帧 · 设备设置与预设保存</p>
                    </div>
                </div>
            </a>
            <!-- ... 其余课程卡片 ... -->
        </div>
    </main>

    <!-- ==================== 右下角胶囊播放栏（继承主页播放器） ==================== -->
    <div id="player-wrapper" class="player-wrapper">
        <div class="album-art">
            <img src="/images/albumpic/homepage.webp" alt="专辑封面">
        </div>
        <div class="meta-wrapper">
            <div class="meta-row">
                <div class="song-title">DOUDOU - 最终观测</div>
                <span class="progress-time" id="progressTime">0:00 / 0:00</span>
            </div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-track"></div>
                <div class="progress-fill" id="progressFill"></div>
                <div class="progress-thumb" id="progressThumb"></div>
            </div>
        </div>
        <button class="play-btn" id="playBtn">
            <svg viewBox="0 0 24 24" class="play-icon" id="playIcon">
                <polygon points="6 3 20 12 6 21 6 3" />
            </svg>
            <svg viewBox="0 0 24 24" class="pause-icon" id="pauseIcon" style="display:none;">
                <rect x="6" y="4" width="4" height="16" />
                <rect x="14" y="4" width="4" height="16" />
            </svg>
        </button>
        <audio id="bgMusic" src="/images/homepagesong/homepagesong.mp3" preload="metadata"></audio>
    </div>

    <!-- 【已删除】独立底栏：现在由 components.js 自动从 /footer.html 注入 -->

    <!-- 引用全局 JS（确保它在页面最后执行） -->
    <script src="../../../js/script.js"></script>
</body>
</html>
