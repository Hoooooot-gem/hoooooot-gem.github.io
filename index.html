<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你的个人网站标题</title>
    <style>
        /* 这里写CSS样式，让网页变漂亮 */
        body {
            font-family: "微软雅黑", sans-serif;
            background-color: #f4f4f9;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #333;
        }
        .card {
            background: white;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        p {
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>你好，我是 [你的名字] 👋</h1>
        <p>这是我的个人网站，欢迎光临！</p>
        <p>我目前在学习做网站，这是我的第一个作品。</p>
        <p>你可以通过邮箱联系我：<strong>你的邮箱@example.com</strong></p>
    </div>
</body>
</html>
