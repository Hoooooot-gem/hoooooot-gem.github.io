<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Test</title>

    <!-- 【全局组件】：自动加载顶栏和底栏 -->
    <script src="/js/components.js"></script>

    <!-- 【全局样式】 -->
    <link rel="stylesheet" href="/css/style.css">
    
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png">
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">

    <!-- 【测速页专属微调样式】 -->
    <style>
        /* 由于页面只有卡牌一个元素，直接垂直撑满 */
        main.speed-main {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - var(--nav-height, 42px) - 40px); /* 减去顶栏和底栏的高度 */
            padding: 40px 24px;
            background-color: var(--bg-color);
            transition: background var(--transition-theme);
        }

        .speed-card {
            width: 100%;
            max-width: 480px;
            padding: 50px 45px;
            background: #FFFFFF; /* 保持卡片纯白背景 */
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.04); /* 更克制的阴影 */
            border: 1px solid var(--border-color);
            transition: background var(--transition-theme), border var(--transition-theme);
        }
        /* 深色模式下卡片背景微调 */
        [data-theme="dark"] .speed-card {
            background: var(--bg-color);
            border-color: var(--border-color);
        }

        .speed-header {
            margin-bottom: 32px;
        }

        .speed-header h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            letter-spacing: -0.03em;
            color: var(--text-primary);
        }

        .speed-header .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .speed-number {
            margin-top: 32px;
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--text-primary);
        }
        .speed-number .unit {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--text-secondary);
            letter-spacing: 0;
        }

        .speed-status {
            margin-top: 12px;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .speed-info {
            margin-top: 32px;
            text-align: left;
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 2.2;
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
        }
        .speed-info .value {
            float: right;
            color: var(--text-primary);
            font-weight: 600;
        }

        /* 复用主页胶囊按钮风格 */
        .speed-btn {
            display: inline-block;
            margin-top: 28px;
            padding: 14px 36px;
            border: 1px solid var(--text-primary);
            border-radius: 999px;
            background: transparent;
            font-size: 1rem;
            font-weight: var(--font-weight-bold);
            color: var(--text-primary);
            cursor: pointer;
            transition: background 0.3s ease, color 0.3s ease, transform 0.2s ease;
        }

        .speed-btn:hover:not(:disabled) {
            background: var(--text-primary);
            color: var(--bg-color);
            transform: translateY(-2px);
        }

        .speed-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .speed-btn:active:not(:disabled) {
            transform: scale(0.97) translateY(-1px);
            transition: transform 80ms ease-out;
        }

        @media (max-width: 480px) {
            .speed-card { padding: 30px 20px; }
            .speed-number { font-size: 3rem; }
            .speed-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- 【已移除】独立顶栏。现在由 components.js 从根目录 /header.html 注入 -->
    <!-- 【已移除】播放栏。严格按照要求不加入播放栏 -->

    <main class="speed-main">
        <div class="speed-card">
            <div class="speed-header">
                <h1>Connection Test</h1>
                <p class="subtitle">检测你与本站服务器之间的连接质量</p>
            </div>

            <div class="speed-number">
                <span id="speed">0</span>
                <span class="unit">Mbps</span>
            </div>

            <div class="speed-status" id="status">等待测试</div>

            <div class="speed-info">
                <div>延迟 RTT <span class="value" id="ping">--</span></div>
                <div>已传输 <span class="value" id="data">0 MB</span></div>
                <div>服务器 <span class="value">Hoooooot</span></div>
                <div>状态 <span class="value" id="quality">--</span></div>
            </div>

            <!-- 【已删除】进度条 HTML 结构 -->

            <button class="speed-btn" id="start">开始检测</button>
        </div>
    </main>

    <!-- 【已移除】独立底栏。现在由 components.js 从根目录 /footer.html 注入 -->

    <!-- 引用全局 JS（确保它在页面最后执行，但不要影响测速逻辑） -->
    <script src="/js/script.js"></script>

    <!-- 【保留】原有的测速核心逻辑 -->
    <script>
        // 【⚠️ 重要路径说明】
        // 请确保你的服务器上，在 /ConnectionTest/assets/connection/ 目录下
        // 确实存放了一个名为 test-50MB.bin 的文件。
        const FILE = "assets/connection/test-50MB.bin";

        const speed = document.getElementById("speed");
        const status = document.getElementById("status");
        const ping = document.getElementById("ping");
        const data = document.getElementById("data");
        const quality = document.getElementById("quality");
        // 【已删除】 bar 变量
        const button = document.getElementById("start");

        let running = false;

        // RTT测试
        async function testPing() {
            const start = performance.now();
            await fetch(
                FILE + "?ping=" + Date.now(),
                { method: "HEAD", cache: "no-store" }
            );
            return Math.round(performance.now() - start);
        }

        async function startTest() {
            if (running) return;
            running = true;
            button.disabled = true;

            speed.textContent = "0";
            status.textContent = "正在连接 Hoooooot...";

            try {
                let rtt = await testPing();
                ping.textContent = rtt + " ms";

                status.textContent = "正在传输测试数据...";

                const response = await fetch(FILE + "?test=" + Date.now());
                const reader = response.body.getReader();

                let total = 0;
                let start = performance.now();
                let last = start;
                let lastBytes = 0;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    total += value.length;

                    let now = performance.now();
                    if (now - last > 200) {
                        let seconds = (now - last) / 1000;
                        let bytes = total - lastBytes;
                        let Mbps = bytes * 8 / seconds / 1000000;

                        speed.textContent = Mbps.toFixed(1);
                        data.textContent = (total / 1024 / 1024).toFixed(1) + " MB";

                        last = now;
                        lastBytes = total;
                    }
                }

                let totalTime = (performance.now() - start) / 1000;
                let average = total * 8 / totalTime / 1000000;

                speed.textContent = average.toFixed(2);
                status.textContent = "检测完成";

                if (average >= 100) quality.textContent = "Excellent";
                else if (average >= 50) quality.textContent = "Great";
                else if (average >= 10) quality.textContent = "Good";
                else quality.textContent = "Slow";

            } catch (e) {
                status.textContent = "连接失败";
                console.error(e);
            }

            button.disabled = false;
            running = false;
        }

        button.onclick = startTest;
    </script>
</body>
</html>
